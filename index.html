<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Escuela de Yoga</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .oculto { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex">

    <div id="login-screen" class="fixed inset-0 bg-white flex items-center justify-center z-50">
        <div class="bg-gray-100 p-8 rounded-2xl shadow-sm w-96 text-center">
            <h1 class="text-2xl font-semibold mb-8">Escuela de Yoga</h1>
            <button id="btn-login-google" class="w-full bg-white border border-gray-300 text-gray-700 p-3 rounded-xl font-medium hover:bg-gray-50 flex items-center justify-center gap-3 shadow-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Ingresar con Google
            </button>
            <p id="login-error" class="text-red-500 text-sm mt-4 oculto">Error al iniciar sesión.</p>
        </div>
    </div>

    <aside class="w-64 bg-white border-r border-gray-200 p-6 flex flex-col justify-between hidden" id="sidebar">
        <div>
            <h2 class="text-xl font-bold mb-8">Abrirnos</h2>
            <nav class="space-y-2">
                <button data-vista="resumen" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-gray-100 font-medium">Resumen</button>
                <button data-vista="ingresos" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-gray-100 font-medium">Ingresos</button>
                <button data-vista="gastos" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-gray-100 font-medium">Gastos</button>
                <button data-vista="alumnos" class="nav-btn w-full text-left p-3 rounded-xl hover:bg-gray-100 font-medium">Alumnos</button>
            </nav>
        </div>
        <button id="btn-logout" class="text-red-500 font-medium text-left p-3 hover:bg-red-50 rounded-xl">Cerrar Sesión</button>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto hidden" id="main-content">
        <header class="flex justify-between items-center mb-8">
            <h2 id="titulo-seccion" class="text-3xl font-semibold">Resumen del Mes</h2>
            <input type="month" id="selector-mes" class="p-2 border border-gray-200 rounded-xl bg-white shadow-sm">
        </header>

        <section id="vista-resumen" class="grid grid-cols-3 gap-6 mb-8 vista-seccion">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 mb-2 text-sm">Ingresos Totales</h3>
                <p class="text-3xl font-bold" id="total-ingresos">$0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 mb-2 text-sm">Gastos Totales</h3>
                <p class="text-3xl font-bold" id="total-gastos">$0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-gray-500 mb-2 text-sm">Alumnos Activos</h3>
                <p class="text-3xl font-bold" id="total-alumnos">0</p>
            </div>
        </section>

        <section id="vista-ingresos" class="vista-seccion oculto"><p>Tabla de Ingresos aquí</p></section>
        <section id="vista-gastos" class="vista-seccion oculto"><p>Tabla de Gastos aquí</p></section>
        <section id="vista-alumnos" class="vista-seccion oculto"><p>Tabla de Alumnos aquí</p></section>

        <div class="flex gap-4">
            <button class="bg-black text-white px-6 py-2 rounded-xl font-medium">+ Cargar Ingreso</button>
            <button class="bg-white border border-gray-300 text-black px-6 py-2 rounded-xl font-medium">+ Cargar Gasto</button>
            <button class="bg-white border border-gray-300 text-black px-6 py-2 rounded-xl font-medium">+ Nuevo Alumno</button>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // PEGAR TU FIREBASE CONFIG AQUÍ:
        const firebaseConfig = {
  apiKey: "AIzaSyAsAK1-1IZ3nlVFBxxKI660TOinJAcUEL4",
  authDomain: "priel-abrirnos.firebaseapp.com",
  projectId: "priel-abrirnos",
  storageBucket: "priel-abrirnos.firebasestorage.app",
  messagingSenderId: "645131969136",
  appId: "1:645131969136:web:9093b392d159a6859f8ab5",
  measurementId: "G-RH6NS2SLF1"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        const loginScreen = document.getElementById('login-screen');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const btnLoginGoogle = document.getElementById('btn-login-google');
        const btnLogout = document.getElementById('btn-logout');
        const loginError = document.getElementById('login-error');
        const tituloSeccion = document.getElementById('titulo-seccion');

        // Estado de autenticación
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginScreen.classList.add('oculto');
                sidebar.classList.remove('hidden');
                mainContent.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('oculto');
                sidebar.classList.add('hidden');
                mainContent.classList.add('hidden');
            }
        });

        // Login Google
        btnLoginGoogle.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .catch((error) => {
                    console.error("Error en login:", error);
                    loginError.classList.remove('oculto');
                });
        });

        // Logout
        btnLogout.addEventListener('click', () => signOut(auth));

        // Navegación
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const vista = e.target.dataset.vista;
                tituloSeccion.innerText = vista.charAt(0).toUpperCase() + vista.slice(1);
                
                document.querySelectorAll('.vista-seccion').forEach(sec => sec.classList.add('oculto'));
                document.getElementById(`vista-${vista}`).classList.remove('oculto');
            });
        });

        document.getElementById('selector-mes').value = new Date().toISOString().slice(0, 7);
    </script>
</body>
</html>
